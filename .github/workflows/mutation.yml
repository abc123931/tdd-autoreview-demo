name: Mutation
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"
jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run test:mutation
